<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IT Asset App</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="login-page">
      <h1>IT Asset Management App</h1>
      <div class="container">
        <img
          src="IMG/Minimalist geometric logo design.png"
          alt="alternatetext"
        />
        <button class="login-btn">Login</button>
      </div>
      <p class="copyright">@ducthangdang</p>
    </div>
    <div class="app hidden">
      <div class="sidebar"></div>
      <div class="main"></div>
    </div>

    <div class="form">
      <!-- TOP -->
      <div class="top">
        <h1>New Order Info</h1>
      </div>
      <!-- MIDDLE -->
      <div class="list">
        <form class="modal-form">
          <label for="name">Name</label>
          <input id="name" type="text" />

          <label for="ico">ICO</label>
          <input id="ico" type="text" />

          <label for="tel">Tel</label>
          <input id="tel" type="number" />

          <label for="device">Device</label>
          <input id="device" type="" />

          <label for="location">Location</label>
          <input id="location" type="" />

          <label for="comments">Comments</label>
          <input id="comments" type="text" />
        </form>
      </div>

      <!-- BOTTOM -->
      <div class="actions">
        <button>Paid</button>
        <button>Unpaid</button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
